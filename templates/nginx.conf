# Headscale Nginx 反代配置
# 关键点：
#   1. 监听端口需绕开云厂商 SNI 深度包检测（腾讯云/阿里云 443 端口拦截未备案域名）
#   2. proxy_buffering off（防止长轮询 context canceled）
#   3. 证书必须包含 SAN 字段（Go 1.15+ 要求）
#
# 使用前请将下方所有 YOUR_ 占位符替换为实际值

# ======================== 替换下方占位符 ========================
# YOUR_DOMAIN    → 你的 Headscale 域名（如 hs.example.com）
# YOUR_PORT      → HTTPS 监听端口（腾讯云/阿里云建议 8443，绕过 SNI 拦截）
# ================================================================

server {
    listen 80;
    server_name YOUR_DOMAIN;
    # HTTP 重定向到 HTTPS（可选，备案域名可启用）
    # return 301 https://$host:YOUR_PORT$request_uri;
}

server {
    listen YOUR_PORT ssl;
    server_name YOUR_DOMAIN;

    # SSL 证书（路径根据实际情况修改）
    ssl_certificate     /etc/nginx/cert.pem;
    ssl_certificate_key /etc/nginx/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 关闭服务端缓存
    proxy_buffering off;
    proxy_cache off;

    # 长轮询超时设置（Headscale 使用 HTTP long-polling 保持控制面连接）
    # Nginx 默认 proxy_buffering on 会缓冲上游响应，导致长轮询超时
    # 必须显式关闭缓冲，否则 tailscale 客户端会报 context canceled
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # 必须关闭缓冲，否则 tailscale long-polling 会 context canceled
        proxy_buffering off;
        proxy_cache off;

        # 长轮询超时
        proxy_read_timeout 600s;

        # 透传 Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # 健康检查端点（可选）
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
