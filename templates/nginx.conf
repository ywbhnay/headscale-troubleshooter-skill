# Headscale Nginx 反代配置
# 关键点：
#   1. 监听 8443 端口（绕过腾讯云 SNI 深度包检测）
#   2. proxy_buffering off（防止长轮询 context canceled）
#   3. 证书必须包含 SAN 字段

server {
    listen 80;
    server_name hs.167895.xyz;
    # HTTP 重定向到 HTTPS（可选，备案域名可启用）
    # return 301 https://$host:8443$request_uri;
}

server {
    listen 8443 ssl;
    server_name hs.167895.xyz;

    # SSL 证书
    ssl_certificate     /etc/nginx/cert.pem;
    ssl_certificate_key /etc/nginx/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 关闭服务端缓存
    proxy_buffering off;
    proxy_cache off;

    # 长轮询超时设置（Headscale 使用 long-polling）
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # 必须关闭缓冲，否则 tailscale long-polling 会 context canceled
        proxy_buffering off;
        proxy_cache off;

        # 长轮询超时
        proxy_read_timeout 600s;

        # 透传 Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # 健康检查端点（可选）
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
